<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 粒子蛋糕 🎂</title>
    <!-- 引入可爱的中文字体 -->
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background:
                radial-gradient(circle at 20% 20%, rgba(87, 136, 255, 0.16), transparent 24%),
                radial-gradient(circle at 80% 15%, rgba(153, 99, 255, 0.18), transparent 26%),
                radial-gradient(circle at 50% 80%, rgba(29, 198, 255, 0.1), transparent 30%),
                linear-gradient(180deg, #02040d 0%, #050713 55%, #010208 100%);
            font-family: 'ZCOOL KuaiLe', cursive, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
            position: relative;
        }

        #cake-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: grab;
            touch-action: none;
        }

        #cake-canvas.dragging {
            cursor: grabbing;
        }

        .cosmic-copy {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 2;
            pointer-events: none;
        }

        .cosmic-kicker {
            letter-spacing: 0.5rem;
            font-size: 0.82rem;
            color: rgba(178, 214, 255, 0.72);
            margin-bottom: 10px;
        }

        #mic-hint {
            position: absolute;
            top: 8%;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 1.5rem;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s;
            line-height: 1.7;
        }

        #wish-text {
            position: absolute;
            top: 85%;
            width: 100%;
            text-align: center;
            color: #ff9a9e;
            font-size: 2.5rem;
            text-shadow: 2px 2px 10px white;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 2s;
        }

        @media (max-width: 768px) {
            .cosmic-kicker {
                letter-spacing: 0.28rem;
                font-size: 0.7rem;
            }

            #mic-hint {
                font-size: 1.2rem;
                top: 10%;
            }

            #wish-text {
                font-size: 1.8rem;
                top: 80%;
            }
        }
    </style>
</head>
<body>
    <canvas id="cake-canvas"></canvas>
    <div class="cosmic-copy">
        <div class="cosmic-kicker">STAR CAKE MODE</div>
    </div>
    <div id="mic-hint">
        试试吹一吹蜡烛吧～✨
    </div>
    <div id="wish-text">
        生日快乐！愿望一定会实现！✨
    </div>

    <!-- 引入彩纸特效库 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        const canvas = document.getElementById('cake-canvas');
        const ctx = canvas.getContext('2d');
        const micHint = document.getElementById('mic-hint');
        const wishText = document.getElementById('wish-text');

        let starPoints = [];
        let cakePoints = [];
        let candlePoints = [];
        let candleAnchors = [];
        let emberParticles = [];
        let isCakeStage = true;
        let isCandleLit = true;
        let fallbackTapToBlow = false;
        let audioContext, analyser, microphone, dataArray;
        let cakeAnimationStarted = false;
        let cakeRotationX = -0.28;
        let cakeRotationY = 0.72;
        let cakeTargetRotationX = -0.28;
        let cakeTargetRotationY = 0.72;
        let spaceOffsetX = 0;
        let spaceOffsetY = 0;
        let spaceTargetOffsetX = 0;
        let spaceTargetOffsetY = 0;
        let spaceDragEnergy = 0;
        const cakeDrag = { active: false, moved: false, pointerId: null, lastX: 0, lastY: 0 };

        function init() {
            resizeCanvas();
            createStarField();
            buildCosmicCake();
            bindCanvasInteractions();
            window.addEventListener('resize', resizeCanvas);

            if (!cakeAnimationStarted) {
                cakeAnimationStarted = true;
                requestAnimationFrame(animateCake);
            }

            setTimeout(() => {
                if (!isCakeStage || !isCandleLit) return;
                micHint.style.opacity = '1';
                requestMicrophone();
            }, 900);
        }

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.floor(window.innerWidth * dpr);
            canvas.height = Math.floor(window.innerHeight * dpr);
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function createStarField() {
            starPoints = [];
            for (let i = 0; i < 460; i++) {
                starPoints.push({
                    x: Math.random() * 2 - 1,
                    y: Math.random() * 2 - 1,
                    depth: Math.random(),
                    size: 0.5 + Math.random() * 2.6,
                    twinkle: Math.random() * Math.PI * 2,
                    speed: 0.45 + Math.random() * 1.7,
                    drift: 6 + Math.random() * 24,
                    orbit: (Math.random() - 0.5) * 0.06,
                    color: Math.random() > 0.72 ? '#9bd2ff' : (Math.random() > 0.44 ? '#ffffff' : '#ffe6a7')
                });
            }
        }

        function buildCosmicCake() {
            cakePoints = [];
            candlePoints = [];
            candleAnchors = [];
            emberParticles = [];

            pushCakeLayer(170, 58, 92, 760, ['#ff5e8a', '#ff8fab', '#ffd166', '#ff8ec7']);
            pushCakeLayer(128, 48, 20, 560, ['#f9a8d4', '#ffd3e2', '#9bf6ff', '#87d9ff']);
            pushCakeLayer(92, 40, -46, 380, ['#c084fc', '#8be9ff', '#fff1f7', '#c7b7ff']);

            pushFrostingRing(176, 64, 220, ['#ffe8f3', '#fff7d6', '#c7f9ff']);
            pushFrostingRing(132, -6, 180, ['#ffe5f0', '#fff6d4', '#b8f4ff']);
            pushFrostingRing(94, -66, 140, ['#fff4fb', '#dff9ff', '#ffe8a3']);
            pushSprinkles(88, -76, 160);

            [
                { x: -48, z: -8, color: '#ffe08a' },
                { x: 0, z: 14, color: '#ffd1dc' },
                { x: 48, z: -12, color: '#b8f4ff' }
            ].forEach((seed, index) => {
                const topY = -122 - index * 2;
                candleAnchors.push({ x: seed.x, y: topY, z: seed.z });
                for (let i = 0; i < 68; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.random() * 6;
                    const y = -70 - Math.random() * 48;
                    candlePoints.push({
                        x: seed.x + Math.cos(angle) * radius,
                        y,
                        z: seed.z + Math.sin(angle) * radius,
                        size: 1 + Math.random() * 1.3,
                        color: i % 3 === 0 ? '#fff7d6' : seed.color,
                        alpha: 0.65 + Math.random() * 0.25
                    });
                }
            });

            cakeRotationX = -0.28;
            cakeRotationY = 0.72;
            cakeTargetRotationX = -0.28;
            cakeTargetRotationY = 0.72;
        }

        function pushCakeLayer(radius, height, centerY, count, palette) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const r = Math.sqrt(Math.random()) * radius;
                cakePoints.push({
                    x: Math.cos(angle) * r,
                    y: centerY + (Math.random() - 0.5) * height,
                    z: Math.sin(angle) * (r * 0.92),
                    size: 1 + Math.random() * 2.3,
                    color: palette[Math.floor(Math.random() * palette.length)],
                    alpha: 0.45 + Math.random() * 0.42
                });
            }
        }

        function pushFrostingRing(radius, y, count, palette) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const ringRadius = radius + (Math.random() - 0.5) * 12;
                cakePoints.push({
                    x: Math.cos(angle) * ringRadius,
                    y: y + (Math.random() - 0.5) * 10,
                    z: Math.sin(angle) * ringRadius * 0.9,
                    size: 1.4 + Math.random() * 2.2,
                    color: palette[Math.floor(Math.random() * palette.length)],
                    alpha: 0.55 + Math.random() * 0.35
                });
            }
        }

        function pushSprinkles(radius, y, count) {
            const colors = ['#ff90b3', '#ffe066', '#7de2ff', '#ffffff', '#d0a3ff'];
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const r = Math.sqrt(Math.random()) * radius;
                cakePoints.push({
                    x: Math.cos(angle) * r,
                    y: y + Math.random() * 10,
                    z: Math.sin(angle) * r * 0.9,
                    size: 1.1 + Math.random() * 2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    alpha: 0.7 + Math.random() * 0.3
                });
            }
        }

        function bindCanvasInteractions() {
            canvas.addEventListener('pointerdown', (event) => {
                if (!isCakeStage) return;
                cakeDrag.active = true;
                cakeDrag.moved = false;
                cakeDrag.pointerId = event.pointerId;
                cakeDrag.lastX = event.clientX;
                cakeDrag.lastY = event.clientY;
                canvas.classList.add('dragging');
                if (canvas.setPointerCapture) {
                    canvas.setPointerCapture(event.pointerId);
                }
            });

            canvas.addEventListener('pointermove', (event) => {
                if (!cakeDrag.active || event.pointerId !== cakeDrag.pointerId) return;

                const dx = event.clientX - cakeDrag.lastX;
                const dy = event.clientY - cakeDrag.lastY;
                if (Math.abs(dx) + Math.abs(dy) > 3) {
                    cakeDrag.moved = true;
                }

                cakeTargetRotationY += dx * 0.012;
                cakeTargetRotationX += dy * 0.008;
                cakeTargetRotationX = Math.max(-1.05, Math.min(0.55, cakeTargetRotationX));
                spaceTargetOffsetX = Math.max(-180, Math.min(180, spaceTargetOffsetX - dx * 1.4));
                spaceTargetOffsetY = Math.max(-150, Math.min(150, spaceTargetOffsetY - dy * 1.1));
                spaceDragEnergy = Math.min(1.35, spaceDragEnergy + Math.min(0.14, (Math.abs(dx) + Math.abs(dy)) / 340));
                cakeDrag.lastX = event.clientX;
                cakeDrag.lastY = event.clientY;
            });

            const endDrag = (event) => {
                if (!cakeDrag.active || event.pointerId !== cakeDrag.pointerId) return;
                const tapped = fallbackTapToBlow && !cakeDrag.moved;

                if (canvas.releasePointerCapture) {
                    try {
                        canvas.releasePointerCapture(event.pointerId);
                    } catch (err) {
                        console.log('pointer release skipped:', err);
                    }
                }

                cakeDrag.active = false;
                cakeDrag.pointerId = null;
                canvas.classList.remove('dragging');

                if (tapped && isCandleLit) {
                    blowOutCandle();
                }
            };

            canvas.addEventListener('pointerup', endDrag);
            canvas.addEventListener('pointercancel', endDrag);
        }

        function rotatePoint(point, rotX, rotY) {
            const cosY = Math.cos(rotY);
            const sinY = Math.sin(rotY);
            const cosX = Math.cos(rotX);
            const sinX = Math.sin(rotX);

            let x = point.x * cosY - point.z * sinY;
            let z = point.x * sinY + point.z * cosY;
            const y = point.y * cosX - z * sinX;
            z = point.y * sinX + z * cosX;
            return { x, y, z };
        }

        function projectPoint(point) {
            const cameraDistance = 720;
            const depth = cameraDistance - point.z;
            if (depth < 80) return null;

            const scale = cameraDistance / depth;
            return {
                x: window.innerWidth / 2 + point.x * scale,
                y: window.innerHeight / 2 + point.y * scale,
                scale,
                depth
            };
        }

        function wrapCoordinate(value, max) {
            if (value < 0) {
                return ((value % max) + max) % max;
            }
            if (value > max) {
                return value % max;
            }
            return value;
        }

        function animateCake(timestamp) {
            requestAnimationFrame(animateCake);
            if (!isCakeStage || !ctx || !canvas) return;

            const time = timestamp * 0.001;
            if (!cakeDrag.active) {
                cakeTargetRotationY += 0.0035;
                spaceTargetOffsetX *= 0.965;
                spaceTargetOffsetY *= 0.965;
            }

            cakeRotationX += (cakeTargetRotationX - cakeRotationX) * 0.08;
            cakeRotationY += (cakeTargetRotationY - cakeRotationY) * 0.08;
            spaceOffsetX += (spaceTargetOffsetX - spaceOffsetX) * 0.08;
            spaceOffsetY += (spaceTargetOffsetY - spaceOffsetY) * 0.08;
            spaceDragEnergy *= 0.94;

            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            drawSpaceBackdrop(time);
            drawStarField(time);
            drawCakeGlow();
            drawCosmicCake(time);
            updateAndDrawEmbers();

            if (analyser && isCandleLit) {
                checkBlow();
            }
        }

        function drawSpaceBackdrop(time) {
            const gradient = ctx.createLinearGradient(0, 0, 0, window.innerHeight);
            gradient.addColorStop(0, '#02040d');
            gradient.addColorStop(0.55, '#050814');
            gradient.addColorStop(1, '#010208');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            [
                { x: window.innerWidth * 0.2 + Math.sin(time * 0.22) * 18 + spaceOffsetX * 0.24, y: window.innerHeight * 0.24 + spaceOffsetY * 0.12, radius: 220, color: 'rgba(83, 121, 255, 0.18)' },
                { x: window.innerWidth * 0.78 + Math.cos(time * 0.28) * 22 + spaceOffsetX * 0.36, y: window.innerHeight * 0.18 - spaceOffsetY * 0.16, radius: 180, color: 'rgba(186, 86, 255, 0.16)' },
                { x: window.innerWidth * 0.52 + spaceOffsetX * 0.2, y: window.innerHeight * 0.72 + Math.sin(time * 0.18) * 14 + spaceOffsetY * 0.24, radius: 250, color: 'rgba(26, 188, 255, 0.10)' }
            ].forEach((nebula) => {
                const glow = ctx.createRadialGradient(nebula.x, nebula.y, 0, nebula.x, nebula.y, nebula.radius);
                glow.addColorStop(0, nebula.color);
                glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(nebula.x, nebula.y, nebula.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            const dustBand = ctx.createLinearGradient(0, window.innerHeight * 0.24, window.innerWidth, window.innerHeight * 0.82);
            dustBand.addColorStop(0, 'rgba(72, 120, 255, 0)');
            dustBand.addColorStop(0.48, 'rgba(90, 144, 255, 0.07)');
            dustBand.addColorStop(0.52, 'rgba(176, 120, 255, 0.09)');
            dustBand.addColorStop(1, 'rgba(72, 120, 255, 0)');
            ctx.save();
            ctx.translate(spaceOffsetX * 0.12, spaceOffsetY * 0.08);
            ctx.rotate(-0.18 + spaceOffsetX * 0.0007);
            ctx.fillStyle = dustBand;
            ctx.fillRect(-120, window.innerHeight * 0.34, window.innerWidth + 240, 180);
            ctx.restore();
        }

        function drawStarField(time) {
            starPoints.forEach((star) => {
                const parallax = 0.15 + star.depth * 1.3;
                const x = wrapCoordinate(
                    (star.x * 0.5 + 0.5) * window.innerWidth
                    + spaceOffsetX * parallax
                    + Math.sin(time * star.orbit + star.twinkle) * star.drift,
                    window.innerWidth
                );
                const y = wrapCoordinate(
                    (star.y * 0.5 + 0.5) * window.innerHeight
                    + spaceOffsetY * (0.08 + star.depth * 0.9)
                    + Math.cos(time * star.orbit + star.twinkle) * star.drift * 0.45,
                    window.innerHeight
                );
                const twinkle = 0.35 + (Math.sin(time * star.speed + star.twinkle) + 1) * 0.35;
                const size = star.size * (0.5 + star.depth * 0.8);
                const stretch = 1 + spaceDragEnergy * (0.8 + star.depth * 2.8);
                const angle = spaceDragEnergy > 0.02 ? Math.atan2(spaceOffsetY || 0.001, spaceOffsetX || 0.001) : 0;

                ctx.globalAlpha = twinkle;
                ctx.fillStyle = star.color;
                ctx.beginPath();
                ctx.ellipse(x, y, size * stretch, size, angle, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.globalAlpha = 1;
        }

        function drawCakeGlow() {
            const glow = ctx.createRadialGradient(
                window.innerWidth / 2,
                window.innerHeight / 2 + 120,
                10,
                window.innerWidth / 2,
                window.innerHeight / 2 + 120,
                220
            );
            glow.addColorStop(0, 'rgba(255, 154, 215, 0.28)');
            glow.addColorStop(0.55, 'rgba(140, 102, 255, 0.16)');
            glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.ellipse(window.innerWidth / 2, window.innerHeight / 2 + 120, 240, 78, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCosmicCake(time) {
            const allPoints = [];

            cakePoints.forEach((point) => {
                const rotated = rotatePoint(point, cakeRotationX, cakeRotationY);
                const projected = projectPoint(rotated);
                if (!projected) return;
                allPoints.push({
                    screenX: projected.x,
                    screenY: projected.y,
                    size: point.size * projected.scale,
                    color: point.color,
                    alpha: point.alpha,
                    depth: rotated.z,
                    glow: point.size > 2 ? 6 : 0
                });
            });

            candlePoints.forEach((point) => {
                const rotated = rotatePoint(point, cakeRotationX, cakeRotationY);
                const projected = projectPoint(rotated);
                if (!projected) return;
                allPoints.push({
                    screenX: projected.x,
                    screenY: projected.y,
                    size: point.size * projected.scale,
                    color: point.color,
                    alpha: point.alpha,
                    depth: rotated.z,
                    glow: 4
                });
            });

            allPoints.sort((a, b) => a.depth - b.depth);
            allPoints.forEach((point) => {
                ctx.globalAlpha = point.alpha;
                if (point.glow) {
                    const halo = ctx.createRadialGradient(point.screenX, point.screenY, 0, point.screenX, point.screenY, point.size + point.glow);
                    halo.addColorStop(0, point.color);
                    halo.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = halo;
                    ctx.beginPath();
                    ctx.arc(point.screenX, point.screenY, point.size + point.glow, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.fillStyle = point.color;
                ctx.beginPath();
                ctx.arc(point.screenX, point.screenY, point.size, 0, Math.PI * 2);
                ctx.fill();
            });

            if (isCandleLit) {
                candleAnchors.forEach((anchor, index) => {
                    const flameCenter = rotatePoint(anchor, cakeRotationX, cakeRotationY);
                    const projected = projectPoint(flameCenter);
                    if (!projected) return;

                    const flicker = 1 + Math.sin(time * 8 + index * 1.7) * 0.18;
                    const flameSize = 16 * projected.scale * flicker;

                    const glow = ctx.createRadialGradient(projected.x, projected.y - flameSize * 0.45, 0, projected.x, projected.y, flameSize * 1.8);
                    glow.addColorStop(0, 'rgba(255, 244, 163, 0.92)');
                    glow.addColorStop(0.35, 'rgba(255, 168, 79, 0.7)');
                    glow.addColorStop(1, 'rgba(255, 117, 24, 0)');
                    ctx.globalAlpha = 0.9;
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(projected.x, projected.y, flameSize * 1.4, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#fffef5';
                    ctx.beginPath();
                    ctx.ellipse(projected.x, projected.y - flameSize * 0.35, flameSize * 0.28, flameSize * 0.6, 0, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#ffb347';
                    ctx.beginPath();
                    ctx.ellipse(projected.x, projected.y - flameSize * 0.05, flameSize * 0.4, flameSize * 0.85, 0, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            ctx.globalAlpha = 1;
        }

        function updateAndDrawEmbers() {
            emberParticles = emberParticles.filter((particle) => {
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.z += particle.vz;
                particle.life -= particle.fade;
                particle.vx *= particle.kind === 'smoke' ? 0.98 : 0.985;
                particle.vy *= particle.kind === 'smoke' ? 0.98 : 0.99;
                particle.vz *= 0.986;

                if (particle.kind === 'ember') {
                    particle.vy -= 0.002;
                } else {
                    particle.vy -= 0.0006;
                }

                if (particle.life <= 0) {
                    return false;
                }

                const rotated = rotatePoint(particle, cakeRotationX, cakeRotationY);
                const projected = projectPoint(rotated);
                if (!projected) return true;

                ctx.globalAlpha = particle.life * (particle.kind === 'smoke' ? 0.35 : 0.78);
                ctx.fillStyle = particle.color;
                ctx.beginPath();
                ctx.arc(projected.x, projected.y, particle.size * projected.scale, 0, Math.PI * 2);
                ctx.fill();
                return true;
            });

            ctx.globalAlpha = 1;
        }

        // 麦克风吹蜡烛逻辑
        async function requestMicrophone() {
            try {
                navigator.getUserMedia = navigator.getUserMedia || navigator.webkitGetUserMedia || navigator.mozGetUserMedia || navigator.msGetUserMedia;

                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    setupAudioContext(stream);
                } else if (navigator.getUserMedia) {
                    navigator.getUserMedia({ audio: true }, setupAudioContext, handleError);
                } else {
                    throw new Error('当前浏览器不支持麦克风API');
                }
            } catch (err) {
                handleError(err);
            }
        }

        function setupAudioContext(stream) {
            fallbackTapToBlow = false;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            microphone = audioContext.createMediaStreamSource(stream);
            microphone.connect(analyser);
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }

        function handleError(err) {
            console.log('麦克风权限被拒绝或不支持:', err);
            fallbackTapToBlow = true;
            micHint.innerHTML = '轻点一下星空也能吹灭蜡烛 🎂<br>拖动时不会误触发';
            micHint.style.opacity = '1';
        }

        function checkBlow() {
            if (!isCandleLit || !analyser) return;

            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }

            const average = sum / dataArray.length;
            if (average > 78) {
                blowOutCandle();
            }
        }

        function blowOutCandle() {
            if (!isCandleLit) return;

            isCandleLit = false;
            fallbackTapToBlow = false;
            micHint.style.opacity = '0';

            candleAnchors.forEach((anchor) => {
                for (let i = 0; i < 18; i++) {
                    emberParticles.push({
                        kind: 'ember',
                        x: anchor.x,
                        y: anchor.y,
                        z: anchor.z,
                        vx: (Math.random() - 0.5) * 2.2,
                        vy: -Math.random() * 1.8 - 0.4,
                        vz: (Math.random() - 0.5) * 2.2,
                        size: 1.4 + Math.random() * 1.8,
                        color: Math.random() > 0.5 ? '#ffd166' : '#fff1f7',
                        life: 1,
                        fade: 0.018 + Math.random() * 0.016
                    });
                }

                for (let i = 0; i < 12; i++) {
                    emberParticles.push({
                        kind: 'smoke',
                        x: anchor.x,
                        y: anchor.y,
                        z: anchor.z,
                        vx: (Math.random() - 0.5) * 1.1,
                        vy: -Math.random() * 1.2 - 0.3,
                        vz: (Math.random() - 0.5) * 1.1,
                        size: 3.4 + Math.random() * 2.6,
                        color: 'rgba(220, 228, 255, 0.85)',
                        life: 0.82 + Math.random() * 0.24,
                        fade: 0.01 + Math.random() * 0.012
                    });
                }
            });

            setTimeout(() => {
                wishText.style.opacity = '1';
                wishText.style.transform = 'translateY(0)';

                confetti({
                    particleCount: 120,
                    spread: 80,
                    origin: { y: 0.58 },
                    colors: ['#ffd166', '#ff8fab', '#8be9ff', '#c084fc', '#ffffff']
                });
            }, 900);
        }

        // 初始化
        init();
    </script>
</body>
</html>
